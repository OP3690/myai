<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="leftLobe" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="rightLobe" x1="1" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="0.45" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Left brain hemisphere (cool side) -->
  <path
    d="M50 6
       C 32 6, 18 14, 11 28
       C 4 42, 6 60, 16 74
       C 22 84, 32 92, 44 94
       C 48 94, 50 92, 50 88
       L 50 12
       C 50 8, 49 6, 50 6 Z"
    fill="url(#leftLobe)"/>

  <!-- subtle gyrus dent — left -->
  <path d="M22 22 q-3 6 1 14 q4 -6 1 -14 Z" fill="#67e8f9" opacity="0.55"/>
  <path d="M14 52 q3 8 11 11 q-4 -7 -11 -11 Z" fill="#0ea5e9" opacity="0.45"/>

  <!-- Right brain hemisphere (warm side) -->
  <path
    d="M50 6
       C 68 6, 82 14, 89 28
       C 96 42, 94 60, 84 74
       C 78 84, 68 92, 56 94
       C 52 94, 50 92, 50 88
       L 50 12
       C 50 8, 51 6, 50 6 Z"
    fill="url(#rightLobe)"/>

  <!-- subtle gyrus dent — right -->
  <path d="M78 22 q3 6 -1 14 q-4 -6 -1 -14 Z" fill="#fde047" opacity="0.55"/>
  <path d="M86 52 q-3 8 -11 11 q4 -7 11 -11 Z" fill="#fb7185" opacity="0.45"/>

  <!-- Central violet AI badge -->
  <rect x="27" y="32" width="46" height="40" rx="12" ry="12" fill="url(#badge)" filter="url(#softShadow)"/>

  <!-- "AI" text -->
  <text
    x="50" y="60"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="ui-sans-serif,system-ui,-apple-system,'Segoe UI',Arial,sans-serif"
    font-size="22"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-0.5">
    AI
  </text>
</svg>
